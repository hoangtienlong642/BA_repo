version: "3.8"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    ports:
      - "12075:12075"
    volumes:
      - ./data:/app/data
      - ./model:/app/model
    environment:
      - PYTHONPATH=/app

  webapp:
    build:
      context: .
      dockerfile: webapp/Dockerfile
    ports:
      - "12076:12076"
    volumes:
      - ./data:/app/data
    environment:
      - PYTHONPATH=/app
      - API_URL=http://api:12075
    depends_on:
      - api
